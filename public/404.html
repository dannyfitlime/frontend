<!doctype html>
<html lang="cs">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>404 | FitLime</title>
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon.png?v=2">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=2">
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon-light.png?v=2" media="(prefers-color-scheme: light)">
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon-dark.png?v=2" media="(prefers-color-scheme: dark)">
  <link rel="stylesheet" href="/styles/base.css">
  <link rel="stylesheet" href="/styles/seo-pages.css">
</head>

<body class="seo-page">
  <main class="seo-shell">
    <header class="seo-topbar">
      <a class="seo-brand" href="/index.html" aria-label="FitLime domov">
        <img src="/images/logo_pruhledne.png" alt="FitLime logo">
        <strong>FitLime</strong>
      </a>
    </header>

    <section class="seo-card 404-card">
      <div class="notfound-layout">
        <div class="notfound-copy">
          <div class="seo-eyebrow">Chyba 404</div>
          <h1 id="title">Stránka nenalezena</h1>
          <p class="seo-lead" id="lead">Zdá se, že tahle stránka zmizela z databáze.<br>Asi stejně rychle jako fast food
            z Vašeho nového jídelníčku.</p>

          <div class="seo-actions">
            <a class="btn" href="/index.html" id="home-link">Zpět na úvod</a>
            <a class="btn outline" href="/form.html" id="form-link-2">Přejít na formulář</a>
          </div>

          <p class="seo-note" id="help-text">Pokud jste se sem dostali přes odkaz na webu, je to chyba na naší straně.
          </p>
        </div>
        <div class="notfound-visual">
          <img src="/images/lime.png" alt="" aria-hidden="true" class="notfound-lime">
        </div>
      </div>
    </section>
  </main>

  <style>
    .notfound-layout {
      display: flex;
      align-items: center;
      gap: 40px;
      text-align: left;
    }

    .notfound-copy {
      flex: 1;
    }

    .notfound-visual {
      flex-shrink: 0;
      display: flex;
      justify-content: center;
    }

    .notfound-lime {
      width: clamp(160px, 15vw, 240px);
      height: auto;
      transform: rotate(270deg);
      opacity: 0.9;
      filter: drop-shadow(0 10px 20px rgba(134, 213, 79, 0.2));
    }

    @media (max-width: 768px) {
      .notfound-layout {
        flex-direction: column;
        gap: 5px;
        text-align: center;
      }

      .seo-actions {
        justify-content: center;
      }
    }
  </style>

  <script>
    const TRANSLATIONS = {
      cs: {
        eyebrow: "Chyba 404",
        title: "Stránka nenalezena",
        lead: "Zdá se, že tahle stránka zmizela z databáze.\nAsi stejně rychle jako fast food z Vašeho nového jídelníčku.",
        home: "Zpět na úvod",
        form: "Přejít na formulář",
        help: "Pokud jste se sem dostali přes odkaz na webu, je to chyba na naší straně."
      },
      sk: {
        eyebrow: "Chyba 404",
        title: "Stránka nenájdená",
        lead: "Zdá sa, že táto stránka zmizla z databázy.\nAsi rovnako rýchlo ako fast food z Vášho nového jedálnička.",
        home: "Späť na úvod",
        form: "Prejsť na formulár",
        help: "Ak ste sa sem dostali cez odkaz na webe, je to chyba na našej strane."
      },
      en: {
        eyebrow: "Error 404",
        title: "Page not found",
        lead: "It seems this page has vanished from the database.\nProbably as fast as fast food from your new meal plan.",
        home: "Back to homepage",
        form: "Open the form",
        help: "If you reached this page from a link on the site, the issue is on our side."
      },
      de: {
        eyebrow: "Fehler 404",
        title: "Seite nicht gefunden",
        lead: "Es scheint, dass diese Seite aus der Datenbank verschwunden ist.\nWahrscheinlich genauso schnell wie Fast Food aus Ihrem neuen Ernährungsplan.",
        home: "Zur Startseite",
        form: "Zum Formular",
        help: "Wenn Sie über einen Link auf der Website hier gelandet sind, liegt der Fehler bei uns."
      },
      es: {
        eyebrow: "Error 404",
        title: "Página no encontrada",
        lead: "Parece que esta página desapareció de la base de datos.\nProbablemente tan rápido como la comida rápida de su nuevo plan alimenticio.",
        home: "Volver al inicio",
        form: "Ir al formulario",
        help: "Si llegó aquí desde un enlace del sitio, el problema está de nuestro lado."
      },
      it: {
        eyebrow: "Errore 404",
        title: "Pagina non trovata",
        lead: "Sembra che questa pagina sia scomparsa dal database.\nProbabilmente veloce quanto il fast food dal Suo nuovo piano alimentare.",
        home: "Torna alla home",
        form: "Vai al modulo",
        help: "Se è arrivato qui da un link del sito, il problema è da parte nostra."
      },
      pl: {
        eyebrow: "Błąd 404",
        title: "Strona nie znaleziona",
        lead: "Wygląda na to, że ta strona zniknęła z bazy danych.\nPrawdopodobnie tak szybko jak fast food z Państwa nowego jadłospisu.",
        home: "Wróć na start",
        form: "Przejdź do formularza",
        help: "Jeśli trafili Państwo tu z linku na stronie, błąd jest po naszej stronie."
      },
      pt: {
        eyebrow: "Erro 404",
        title: "Página não encontrada",
        lead: "Parece que esta página desapareceu da base de dados.\nProvavelmente tão rápido quanto fast food do seu novo plano alimentar.",
        home: "Voltar ao início",
        form: "Abrir formulário",
        help: "Se você chegou aqui por um link do site, o problema está do nosso lado."
      },
      fr: {
        eyebrow: "Erreur 404",
        title: "Page introuvable",
        lead: "Il semble que cette page ait disparu de la base de données.\nProbablement aussi vite que le fast-food de votre nouveau régime.",
        home: "Retour à l'accueil",
        form: "Ouvrir le formulaire",
        help: "Si vous êtes arrivé ici via un lien du site, le problème vient de notre côté."
      }
    };

    const SUPPORTED = Object.keys(TRANSLATIONS);
    const HOST_LANG_RULES = [
      { suffix: "fitlime.sk", lang: "sk" },
      { suffix: "fitlime.eu", lang: "en" },
      { suffix: "fitlime.cz", lang: "cs" }
    ];
    const IS_PROD_HOST = /fitlime\.(cz|sk|eu)$/i.test(location.hostname);

    function hostPreferredLang(hostname = location.hostname) {
      const host = (hostname || "").toLowerCase();
      const rule = HOST_LANG_RULES.find((entry) =>
        host === entry.suffix ||
        host.endsWith("." + entry.suffix) ||
        host.endsWith(entry.suffix)
      );
      return rule ? rule.lang : null;
    }

    function resolveLang() {
      const urlLang = new URLSearchParams(location.search).get("lang");
      if (urlLang && SUPPORTED.includes(urlLang)) {
        localStorage.setItem("lang", urlLang);
        return urlLang;
      }

      const stored = localStorage.getItem("lang");
      if (stored && SUPPORTED.includes(stored)) {
        return stored;
      }

      const hostLang = IS_PROD_HOST ? hostPreferredLang() : null;
      if (hostLang && SUPPORTED.includes(hostLang)) {
        return hostLang;
      }

      const navLang = (navigator.language || "").slice(0, 2).toLowerCase();
      if (SUPPORTED.includes(navLang)) {
        return navLang;
      }

      return "en";
    }

    const lang = resolveLang();
    const t = TRANSLATIONS[lang] || TRANSLATIONS.en;
    document.documentElement.lang = lang;
    document.title = "404 | FitLime";

    document.querySelector(".seo-eyebrow").textContent = t.eyebrow;
    document.getElementById("title").textContent = t.title;

    /* preserve the line break in the lead */
    const leadEl = document.getElementById("lead");
    leadEl.innerHTML = "";
    t.lead.split("\n").forEach((line, i, arr) => {
      leadEl.appendChild(document.createTextNode(line));
      if (i < arr.length - 1) leadEl.appendChild(document.createElement("br"));
    });

    document.getElementById("home-link").textContent = t.home;
    document.getElementById("form-link-2").textContent = t.form;
    document.getElementById("help-text").textContent = t.help;
  </script>
</body>

</html>
