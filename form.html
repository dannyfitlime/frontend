<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, follow">
  <meta name="description" content="Vyplňte krátký dotazník a získejte jídelníček na míru od FitLime." data-i18n="form.meta.description">
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon.png?v=2">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=2">
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon-light.png?v=2" media="(prefers-color-scheme: light)">
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon-dark.png?v=2" media="(prefers-color-scheme: dark)">
  <title>FitLime – objednávka</title>
  <link rel="stylesheet" href="/styles/base.css" />
  <link rel="stylesheet" href="/styles/form-layout.css"/>
  <link rel="stylesheet" href="/styles/form.css" />
  <script src="/pricing.js"></script>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-EM0R7B35P2"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('consent', 'default', {
      'analytics_storage': 'denied',
      'ad_storage': 'denied'
    });
    gtag('config', 'G-EM0R7B35P2');
  </script>
</head>
<body>
  <script type="module" src="/src/password-gate.js"></script>
  <!-- NOVÁ HLAVIČKA -->
  <header class="page-header">
    <div class="header-title">
      <h1 id="step-title">Název aktuální sekce</h1>
    </div>
    <a href="/index.html" class="brand header-logo" data-keep-lang>
      <img src="/images/logo.png" alt="Logo FitLime" class="header-logo__img">
    </a>
    <nav class="header-steps" role="navigation" aria-label="Průběh kroků">
      <div id="stepper" class="stepper">
        <!-- tvoje .dot tečky -->
      </div>
    </nav>
  </header>

  <!-- Obsah -->
  <main class="container">
    <!-- Intro slide -->
    <section class="intro-hero" aria-label="Úvod k formuláři">
      <h2 data-i18n="intro.title">Začni svou cestu k lepšímu stravování</h2>
      <ul class="bullets">
        <li><span data-i18n="intro.point1">Zjistíš své potřeby – rychlý výpočet energie a cílů.</span></li>
        <li><span data-i18n="intro.point2">Dostaneš plán – doporučení jídelníčku a aktivit.</span></li>
        <li><span data-i18n="intro.point3">Celkový přehled – jasné kroky, co dělat dál.</span></li>
      </ul>
      <button id="intro-start" class="cta-primary pulse">
        🚀 <span data-i18n="intro.cta">Pojďme na to</span>
      </button>
    </section>

    <!-- Aktuální krok -->
    <section class="step" aria-live="polite">
      <div id="step-container"></div>
    </section>
  
    <!-- CTA -->
    <section id="step-cta" class="cta" aria-label="Ovládání formuláře">
      <button id="btn-back" disabled>
        <span data-i18n="common.back">Zpět</span>
      </button>
      <button id="btn-next">
        <span data-i18n="common.next">Další</span>
      </button>
    </section>
    
  </main>

  <!-- Footer -->
  <footer class="site-footer" role="contentinfo">
    <div class="site-footer__inner">
      <!-- Levý blok: odkazy -->
      <div class="footer-left">
        <nav class="footer-links" aria-label="Právní odkazy">
          <a href="/terms.html" data-i18n="home.footer.terms" data-keep-lang></a>
          <a href="/gdpr.html" data-i18n="home.footer.privacy" data-keep-lang></a>
          <a href="/cookies.html" data-i18n="home.footer.cookies" data-keep-lang></a>
        </nav>
      </div>

      <!-- Střední blok: značka -->
      <div class="footer-center">
        <span class="brandline" data-i18n="home.footer.form_tagline">FitLime · jídelníček na míru</span>
      </div>

      <!-- Pravý blok: platby -->
      <div class="footer-right">
        <div>
          <a data-contact-email data-user="info" data-domain="fitlime.cz"></a>
        </div>
      </div>
    </div>
  </footer>

  <!-- Skripty -->
  <script type="module" src="/src/app.js"></script>
  <script type="module" src="/src/stepsapp.js"></script>
  <script type="module">
    import { bootI18n, i18n } from '/src/i18n-core.js';

    const KEEP_LANG_SELECTOR = '[data-keep-lang]';
    function applyLangToLinks(lang){
      document.querySelectorAll(KEEP_LANG_SELECTOR).forEach(link => {
        const url = new URL(link.getAttribute('href'), location.origin);
        url.searchParams.set('lang', lang);
        link.href = url.pathname + url.search + url.hash;
      });
    }

    // Nastavit rok ve footeru, pokud je v aktuální variantě patičky použitý.
    const yearEl = document.getElementById('year');
    if (yearEl) yearEl.textContent = new Date().getFullYear();

    function renderContactEmails() {
      document.querySelectorAll('[data-contact-email]').forEach(el => {
        const u = el.dataset.user;
        const d = el.dataset.domain;
        if (u && d) {
          const mail = u + '@' + d;
          el.href = 'mailto:' + mail;
          el.textContent = mail;
        }
      });
    }

    // Načíst jazyk podle priority (?lang → localStorage → browser → fallback)
    (async () => {
      await bootI18n();
      applyLangToLinks(i18n.lang);
      renderContactEmails();
    })();

    // Intro krok (mezikrok)
(function(){
  const started = sessionStorage.getItem('formStarted') === '1';
  if (!started){
    document.body.classList.add('intro-mode');
  }
  const btn = document.getElementById('intro-start');
  if (btn){
    btn.addEventListener('click', ()=>{
      sessionStorage.setItem('formStarted','1');
      document.body.classList.remove('intro-mode');

      // --- přidané: reset scrollu ---
      window.scrollTo({ top: 0, left: 0, behavior: 'auto' });

     
    });
  }
})();

  </script>
</body>
</html>
